<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Florencio Flores</title>
    <style>
        body { font-family: sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background-color: #f9fff9; }
        h1 { text-align: center; color: #2ecc11; }
        .nav { text-align: center; margin-bottom: 20px; }
        .catalogo { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .producto-card { border: 2px solid #2ecc11; padding: 10px; border-radius: 8px; text-align: center; background: white; }
        .producto-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 4px; background: #eee; }
        button { cursor: pointer; padding: 10px; background: #2ecc11; color: white; border: none; border-radius: 4px; width: 100%; margin-top: 10px; }
        #carrito { border: 2px solid #2ecc11; padding: 20px; margin-top: 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Florencio Flores</h1>
    <div class="nav">
        <button onclick="filtrar('todos')">Todos</button>
        <button onclick="filtrar('hortalizas')">Hortalizas</button>
    </div>
    <div class="catalogo" id="grid"></div>
    <div id="carrito">
        <h2>Tu Pedido</h2>
        <p>El carrito está vacío.</p>
    </div>

    <script>
        const productos = [
            { nombre: "Acelga", img: "acelga_tallo_naranjo.png" },
            { nombre: "Achicoria", img: "achicoria.jpg" },
            { nombre: "Ají Cacho", img: "aji_cacho.jpg" },
            { nombre: "Amaranto", img: "amaranto.jpg" },
            { nombre: "Apio", img: "apio.jpg" },
            { nombre: "Berro", img: "berro.jpg" },
            { nombre: "Brócoli", img: "brocoli.jpg" }
        ];

        function renderizar(lista) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            lista.forEach(p => {
                grid.innerHTML += `
                    <div class="producto-card">
                        <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150'">
                        <h3>${p.nombre}</h3>
                        <button>Agregar</button>
                    </div>`;
            });
        }
        renderizar(productos);
    </script>
</body>
</html>
