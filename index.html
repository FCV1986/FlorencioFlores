        button.btn-agregar { cursor: pointer; padding: 10px; background: #2ecc11; color: white; border: none; border-radius: 4px; width: 100%; margin-top: 5px; }

        let carrito = [];

        function filtrar(c) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const lista = (c === 'todos') ? productos : productos.filter(p => p.cat === c);
            lista.forEach(p => {
                grid.innerHTML += `
                    <div class="producto-card">
                        <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150?text=Sin+Foto'">
                        <h4>${p.nombre}</h4>
                        <button class="btn-agregar" onclick="agregar(${p.id})">Agregar</button>
                    </div>`;
            });
        }

        function agregar(id) {
            const p = productos.find(x => x.id === id);
            carrito.push(p);
            document.getElementById('lista-carrito').innerHTML = carrito.map(i => `<div>${i.nombre}</div>`).join('');
            document.getElementById('total').innerText = carrito.length * 1000;
        }

        function enviarWhatsApp() {
            if(carrito.length === 0) return;
            const msg = "Hola, quiero pedir: " + carrito.map(i => i.nombre).join(", ");
            window.open("https://wa.me/56966956878?text=" + encodeURIComponent(msg));
        }
