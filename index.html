    <title>Catálogo Florencio Flores</title>

        h1 { text-align: center; color: #2ecc11; }
        .catalogo { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .producto-card { border: 2px solid #2ecc11; padding: 10px; border-radius: 8px; text-align: center; background: white; }
        .producto-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 4px; background: #eee; }
        button { cursor: pointer; padding: 10px; background: #2ecc11; color: white; border: none; border-radius: 4px; width: 100%; margin-top: 10px; }
    </style>
</head>
