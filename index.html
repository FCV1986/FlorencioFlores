<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Florencio Flores</title>
    <style>
        body { font-family: sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; background-color: #f9fff9; }
        h1 { text-align: center; color: #2ecc11; margin-bottom: 30px; }
        .catalogo { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .producto-card { border: 2px solid #2ecc11; padding: 10px; border-radius: 8px; text-align: center; background: white; }
        .producto-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 4px; background: #eee; }
        button { cursor: pointer; padding: 10px; background: #2ecc11; color: white; border: none; border-radius: 4px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Florencio Flores</h1>
    <div class="catalogo" id="grid"></div>

    <script>
        const productos = [
            { nombre: "Acelga", img: "acelga.jpg" },
            { nombre: "Achicoria", img: "achicoria.jpg" },
            { nombre: "Amaranto", img: "amaranto.jpg" },
            { nombre: "Apio", img: "apio.jpg" },
            { nombre: "Betarraga", img: "betarraga.jpg" },
            { nombre: "Zanahoria", img: "zanahoria.jpg" }
        ];

        const grid = document.getElementById('grid');
        grid.innerHTML = ''; // Esto elimina lo que haya antes para que no se duplique
        
        productos.forEach(p => {
            grid.innerHTML += `
                <div class="producto-card">
                    <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150?text=Sin+Foto'">
                    <h3>${p.nombre}</h3>
                    <button onclick="alert('Agregado')">Agregar</button>
                </div>`;
        });
    </script>
</body>
</html>
