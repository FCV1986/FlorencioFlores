    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
        body { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: #ffffff; 
            color: #111111; 
        }
        
        /* Estructura en columnas fijas */
        .contenedor { 
            display: flex; 
            gap: 20px; 
            align-items: flex-start; 
        }
        
        /* Cuadrícula de productos */
        .catalogo { 
            flex: 3; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 15px; 
        }
        
        /* Tarjetas con bordes verdes y fondo blanco */
        .producto-card { 
            border: 2px solid #2ecc11; 
            padding: 15px; 
            border-radius: 8px; 
            text-align: center; 
            background: #ffffff; 
        }
        
        .producto-card img { 
            max-width: 100%; 
            height: 180px; 
            object-fit: cover; 
            border-radius: 4px; 
            display: block; 
            margin: 0 auto 10px; 
        }
        
        /* Barra del carrito fijada a la derecha */
        .carrito-seccion { 
            flex: 1; 
            min-width: 260px; 
            border-left: 2px solid #2ecc11; 
            padding-left: 20px; 
            position: sticky; 
            top: 20px; 
            height: fit-content; 
        }
        
        /* Textos siempre en negro visible */
        .carrito-seccion p, .carrito-seccion div, .carrito-seccion h2, .carrito-seccion h3, p {
            color: #111111 !important; 
        }
        
        .filtros { 
            margin-bottom: 20px; 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; 
        }
        
        .btn-filtro { 
            cursor: pointer; 
        }
        
        .item-carrito { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 10px; 
        }
    </style>
</head>

            { id: 46, nombre: "Tomate Cal Ace",         categoria: "sobres-hortalizas", precio: 1000, imagen: "fotos_hortalizas/tomate_cal_ace.jpg" },
            { id: 47, nombre: "Tomate Rosado",          categoria: "sobres-hortalizas", precio: 1000, imagen: "fotos_hortalizas/tomate_rosado.jpg" },
            { id: 48, nombre: "Zapallo Butternut",      categoria: "sobres-hortalizas", precio: 1000, imagen: "fotos_hortalizas/zapallo_butternut.png" },
            { id: 49, nombre: "Zapallo Italiano Ama.",  categoria: "sobres-hortalizas", precio: 1000, imagen: "fotos_hortalizas/zapallo_italiano_amarillo.png" },
            { id: 50, nombre: "Zapallo Italiano Bola 8",categoria: "sobres-hortalizas", precio: 1000, imagen: "fotos_hortalizas/zapallo_italiano_bola8.png" },
            { id: 51, nombre: "Zapallo Italiano Gris",  categoria: "sobres-hortalizas", precio: 1000, imagen: "fotos_hortalizas/zapallo_italiano_gris.jpg" }
        ];

        let carrito = [];
        const WHATSAPP_DANIELA = "56966956878";

        function mostrarProductos(lista) {
            const grid = document.getElementById('grid-productos');
            grid.innerHTML = '';
            
            if (!lista || lista.length === 0) {
                grid.innerHTML = '<p style="color: #111111; font-weight: bold; text-align: center; width: 100%;">No hay productos en esta categoría.</p>';
                return;
            }

            lista.forEach(p => {
                grid.innerHTML += `
                    <div class="producto-card">
                        <img src="${p.imagen}" alt="${p.nombre}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/628/628283.png'">
                        
                        <h4 style="color: #111111; margin: 10px 0 5px 0; font-size: 1.1em; font-weight: bold;">
                            ${p.nombre}
                        </h4>
                        
                        <p style="margin: 5px 0 10px 0; font-size: 1.05em;">
                            <strong style="color: #111111;">$${p.precio.toLocaleString('es-CL')}</strong>
                        </p>
                        
                        <button onclick="agregarAlCarrito(${p.id})" style="cursor: pointer;">
                            Agregar
                        </button>
                    </div>
                `;
            });
        }

        function filtrarProductos(categoria) {
            if (categoria === 'todos') {
                mostrarProductos(productos);
            } else {
                const filtrados = productos.filter(p => p.categoria === categoria);
                mostrarProductos(filtrados);
            }
        }

        function agregarAlCarrito(id) {
            const producto = productos.find(p => p.id === id);
            const existe = carrito.find(item => item.id === id);
            if (existe) {
                existe.cantidad++;
            } else {
                carrito.push({ ...producto, cantidad: 1 });
            }
            actualizarCarrito();
        }

        function cambiarCantidad(id, cambio) {
            const item = carrito.find(i => i.id === id);
            if (item) {
                item.cantidad += cambio;
                if (item.cantidad <= 0) {
                    carrito = carrito.filter(i => i.id !== id);
                }
            }
            actualizarCarrito();
        }

        function actualizarCarrito() {
            const contenedorHTML = document.getElementById('items-carrito');
            const totalHTML = document.getElementById('total-precio');
            
            if (carrito.length === 0) {
                contenedorHTML.innerHTML = '<p style="color: #111111;">El carrito está vacío.</p>';
                totalHTML.innerText = '0';
                return;
            }

            contenedorHTML.innerHTML = '';
            let total = 0;

            carrito.forEach(item => {
                total += item.precio * item.cantidad;
                contenedorHTML.innerHTML += `
                    <div class="item-carrito">
                        <span style="color: #111111;">${item.nombre} (x${item.cantidad})</span>
                        <div>
                            <button onclick="cambiarCantidad(${item.id}, 1)">+</button>
                            <button onclick="cambiarCantidad(${item.id}, -1)">-</button>
                        </div>
                    </div>
                `;
            });
            totalHTML.innerText = total.toLocaleString('es-CL');
        }

        function enviarWhatsApp() {
            if (carrito.length === 0) {
                alert("¡El carrito está vacío!");
                return;
            }
            let mensaje = `✨ *Nuevo Pedido - Florencio Flores* ✨\n\n`;
            let total = 0;
            carrito.forEach(item => {
                const subtotal = item.precio * item.cantidad;
                mensaje += `• ${item.nombre} x${item.cantidad} ($${subtotal.toLocaleString('es-CL')})\n`;
                total += subtotal;
            });
            mensaje += `\n💰 *Total a pagar:* $${total.toLocaleString('es-CL')}\n\n`;
            mensaje += `Por favor, envíame los datos de transferencia para coordinar el envío. 🚚🌱`;
            window.open(`https://wa.me/${WHATSAPP_DANIELA}?text=${encodeURIComponent(mensaje)}`, '_blank');
        }

        mostrarProductos(productos);
    </script>
