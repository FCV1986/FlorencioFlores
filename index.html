<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Florencio Flores</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .logo { text-align: center; margin-bottom: 20px; }
        .filtros { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .catalogo { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { border: 1px solid #2ecc11; padding: 10px; border-radius: 8px; text-align: center; }
        .card img { width: 100%; height: 100px; object-fit: cover; }
        #carrito { margin-top: 40px; border-top: 2px solid #ccc; padding-top: 20px; }
    </style>
</head>
<body>

    <div class="logo"><img src="logo.jpg" alt="Logo Florencio Flores" style="max-width: 200px;"></div>

    <div class="filtros">
        <button onclick="filtrar('todos')">Todos</button>
        <button onclick="filtrar('hortalizas')">Hortalizas</button>
        <button onclick="filtrar('flores')">Flores</button>
        <button onclick="filtrar('porotos')">Legumbres</button>
        <button onclick="filtrar('bolsas')">Semillas en Bolsa</button>
    </div>

    <div class="catalogo" id="grid"></div>

    <div id="carrito">
        <h2>Tu Pedido</h2>
        <ul id="lista-pedido"><li>El carrito está vacío.</li></ul>
    </div>

    <script src="products.js"></script>
    <script>
        function render(lista) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            lista.forEach(p => {
                grid.innerHTML += `<div class="card">
                    <img src="${p.img}" onerror="this.style.display='none'">
                    <h3>${p.nombre}</h3>
                    <button>Agregar</button>
                </div>`;
            });
        }

        // --- ESTA ES LA PARTE QUE TE FALTA ---
        function filtrar(cat) {
            if(cat === 'todos') {
                render(productos);
            } else {
                const filtrados = productos.filter(p => p.categoria === cat);
                render(filtrados);
            }
        }

        // Carga inicial para que no aparezca vacío al abrir
        render(productos);
    </script>
</body>
</html>
