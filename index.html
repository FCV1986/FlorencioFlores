<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Florencio Flores</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .logo { text-align: center; margin-bottom: 20px; }
        .filtros { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .catalogo { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { border: 1px solid #2ecc11; padding: 10px; border-radius: 8px; text-align: center; }
        .card img { width: 100%; height: 100px; object-fit: cover; }
        #carrito { border: 1px solid #ccc; padding: 20px; margin-bottom: 30px; }
        .btn-activo { background-color: #2ecc11 !important; color: white; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="logo"><img src="logo.jpg" alt="Logo Florencio Flores" style="max-width: 200px;"></div>

    <div id="carrito">
        <h2>Tu Pedido 🛒</h2>
        <ul id="lista-pedido"><li>El carrito está vacío.</li></ul>
        <button onclick="enviarWhatsApp()">Enviar Pedido por WhatsApp 📲</button>
        <button id="btn-admin" onclick="descargarCSV()" style="display: none;">Descargar Base de Datos (CSV) 📊</button>
    </div>

    <div class="filtros">
        <button onclick="filtrar('todos', this)">Todos</button>
        <button onclick="filtrar('hortalizas', this)">Hortalizas</button>
        <button onclick="filtrar('flores', this)">Flores</button>
        <button onclick="filtrar('Legumbres y varios', this)">Legumbres y varios</button>
        <button onclick="filtrar('bolsas', this)">Semillas en bolsa</button>
    </div>

    <div class="catalogo" id="grid"></div>

    <script src="products.js"></script>
    <script>
        let carrito = [];

        function render(lista) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            lista.forEach(p => {
                grid.innerHTML += `<div class="card">
                    <img src="${p.img}" onerror="this.style.display='none'">
                    <h3>${p.nombre}</h3>
                    <button onclick="agregarAlCarrito('${p.nombre}')">Agregar</button>
                </div>`;
            });
        }

        function agregarAlCarrito(nombre) {
            carrito.push(nombre);
            const listaPedido = document.getElementById('lista-pedido');
            if (carrito.length === 1) listaPedido.innerHTML = '';
            const li = document.createElement('li');
            li.textContent = nombre;
            listaPedido.appendChild(li);
            alert(nombre + " agregado al pedido.");
        }

        function filtrar(cat, btn) {
            document.querySelectorAll('.filtros button').forEach(b => b.classList.remove('btn-activo'));
            if(btn) btn.classList.add('btn-activo');
            const grid = document.getElementById('grid');
            const lista = (cat === 'todos') ? productos : productos.filter(p => p.categoria === cat);
            if (lista.length === 0) {
                grid.innerHTML = '<p>No hay productos en esta categoría.</p>';
            } else {
                render(lista);
            }
        }

        // --- Nuevas funciones para WhatsApp y Ciencia de Datos ---

        function enviarWhatsApp() {
            if (carrito.length === 0) return alert("El carrito está vacío");
            let mensaje = "Hola Daniela, quiero pedir: " + carrito.join(", ");
            let url = "https://wa.me/56966956878?text=" + encodeURIComponent(mensaje);
            window.open(url, '_blank');
        }

        function descargarCSV() {
            if (carrito.length === 0) return alert("No hay datos para exportar");
            let csvContent = "data:text/csv;charset=utf-8,Fecha,Producto\n";
            let fechaActual = new Date().toISOString().split('T')[0];
            carrito.forEach(item => {
                csvContent += fechaActual + "," + item + "\n";
            });
            let encodedUri = encodeURI(csvContent);
            let link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "base_de_datos_pedidos.csv");
            document.body.appendChild(link);
            link.click();
        }

        render(productos);

        // Detectar si el administrador accede a la página con un parámetro secreto
window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('modo') === 'admin') {
        document.getElementById('btn-admin').style.display = 'block';
    }
};
    </script>
</body>
</html>
