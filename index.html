        function mostrarProductos(cat) {
            const grid = document.getElementById('grid-productos');

            const lista = (cat === 'todos') ? productos : productos.filter(p => p.categoria === cat);
            lista.forEach(p => {
                grid.innerHTML += `
                    <div class="producto-card">
                        <h4>${p.nombre}</h4>
                        <button onclick="agregarAlCarrito(${p.id})">Agregar</button>
                    </div>`;
            });
        }

        function agregarAlCarrito(id) {
            const prod = productos.find(p => p.id === id);
            carrito.push(prod);
            actualizarCarrito();

            const url = 'https://script.google.com/macros/s/AKfycbyVcwBgbGtXT9CcVvyhLvYleblwIx_W9iE1HLeUSLg-t81rDWX13800uE0DFiP45Ohu/exec';
            
            fetch(`${url}?producto=${encodeURIComponent(prod.nombre)}&categoria=${encodeURIComponent(prod.categoria)}&precio=${prod.precio}`, { mode: 'no-cors' })
            .then(() => console.log("Datos enviados a la planilla"))
            .catch(e => console.error("Error al enviar", e));
        }

        function actualizarCarrito() {
            document.getElementById('items-carrito').innerHTML = carrito.map(i => `<div>${i.nombre}</div>`).join('');
            document.getElementById('total-precio').innerText = (carrito.length * 1000);
        }

            let msg = "Hola, quiero: " + carrito.map(i => i.nombre).join(", ");
            window.open("https://wa.me/56966956878?text=" + encodeURIComponent(msg));
