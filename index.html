        let carrito = [];
        const WHATSAPP_DANIELA = "56966956878";

        function mostrarProductos(lista) {
            const grid = document.getElementById('grid-productos');
            grid.innerHTML = '';
            lista.forEach(p => {
                grid.innerHTML += `
                    <div class="producto-card">
                        <img src="${p.imagen}" alt="${p.nombre}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/628/628283.png'">
                        <h4>${p.nombre}</h4>
                        <p><strong>$${p.precio.toLocaleString('es-CL')}</strong></p>
                        <button onclick="agregarAlCarrito(${p.id})">Agregar</button>
                    </div>
                `;
            });
        }

        function agregarAlCarrito(id) {
            const producto = productos.find(p => p.id === id);
            const existe = carrito.find(item => item.id === id);
            if (existe) existe.cantidad++;
            else carrito.push({ ...producto, cantidad: 1 });
            actualizarCarrito();
        }

        function actualizarCarrito() {
            const contenedorHTML = document.getElementById('items-carrito');
            const totalHTML = document.getElementById('total-precio');
            if (carrito.length === 0) {
                contenedorHTML.innerHTML = '<p>El carrito está vacío.</p>';
                totalHTML.innerText = '0';
                return;
            }
            contenedorHTML.innerHTML = '';
            let total = 0;
            carrito.forEach(item => {
                total += item.precio * item.cantidad;
                contenedorHTML.innerHTML += `
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <span>${item.nombre} (x${item.cantidad})</span>
                        <button onclick="carrito = carrito.filter(i => i.id !== ${item.id}); actualizarCarrito();">X</button>
                    </div>
                `;
            });
            totalHTML.innerText = total.toLocaleString('es-CL');
        }

        function enviarWhatsApp() {
            if (carrito.length === 0) return alert("Carrito vacío");
            let mensaje = "Hola Daniela, quiero: ";
            carrito.forEach(i => mensaje += `${i.nombre} (x${i.cantidad}), `);
            window.open(`https://wa.me/${WHATSAPP_DANIELA}?text=${encodeURIComponent(mensaje)}`, '_blank');
        }

        // Cargar todo al iniciar
        mostrarProductos(productos);
