        let carrito = [];

        function mostrarProductos(cat) {
            const grid = document.getElementById('grid-productos');
            grid.innerHTML = '';
            const lista = (cat === 'todos') ? productos : productos.filter(p => p.categoria === cat);
            lista.forEach(p => {
                grid.innerHTML += `
                    <div class="producto-card">
                        <img src="${p.imagen}" alt="${p.nombre}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/628/628283.png'">
                        <h4>${p.nombre}</h4>
                        <button onclick="agregarAlCarrito(${p.id})">Agregar</button>
                    </div>`;
                
                    function agregarAlCarrito(id) {
            const prod = productos.find(p => p.id === id);
            carrito.push(prod);
            actualizarCarrito();
        
            // Nueva URL de tu Apps Script
            let url = 'https://script.google.com/macros/s/AKfycbzBVUR-LlhdxNlqhf-QSZePnliYLTdNQc4NjCcY8xB8cTLCL6DS62D1N_PWnU8_c2Ut/exec';
            
            // Construimos la URL con los datos
            let fullUrl = url + `?producto=${encodeURIComponent(prod.nombre)}&categoria=${encodeURIComponent(prod.categoria)}&precio=${prod.precio}`;
        
            // Enviamos el dato
            fetch(fullUrl, { method: 'GET' })
            .then(response => {
                console.log("¡Dato enviado a tu planilla!");
            })
            .catch(error => {
                console.error("Error al enviar el dato:", error);
            });
        }

        function actualizarCarrito() {
            const cont = document.getElementById('items-carrito');
            cont.innerHTML = carrito.map(i => `<div>${i.nombre}</div>`).join('');
            document.getElementById('total-precio').innerText = (carrito.length * 1000);
        }

        function enviarWhatsApp() {
            let msg = "Hola, quiero: " + carrito.map(i => i.nombre).join(", ");
            window.open("https://wa.me/56966956878?text=" + encodeURIComponent(msg));
        }

        window.onload = () => mostrarProductos('todos');
    </script>
