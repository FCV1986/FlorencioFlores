<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Florencio Flores</title>
    <style>
        .catalogo { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .card { border: 1px solid #ddd; padding: 5px; text-align: center; }
        .card img { width: 100%; height: 100px; object-fit: cover; }
    </style>
</head>
<body>
    <h1>Catálogo Completo</h1>
    <div class="catalogo" id="grid"></div>
    <script src="products.js"></script>
    <script>
        const grid = document.getElementById('grid');
        productos.forEach(p => {
            grid.innerHTML += `<div class="card"><img src="${p.img}" onerror="this.style.display='none'"><h3>${p.nombre}</h3></div>`;
        });
    </script>
</body>
